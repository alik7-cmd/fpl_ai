<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FPL Chat Agent</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f7f7f7; }
        #chatbox { width: 400px; margin: 40px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #ccc; padding: 20px; }
        #messages { height: 300px; overflow-y: auto; border: 1px solid #eee; padding: 10px; margin-bottom: 10px; background: #fafafa; }
        .msg { margin: 8px 0; }
        .user { color: #007bff; }
        .bot { color: #333; }
        #input-area { display: flex; }
        #user-input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        #send-btn { padding: 8px 16px; margin-left: 8px; border: none; background: #007bff; color: #fff; border-radius: 4px; cursor: pointer; }
        #send-btn:disabled { background: #aaa; }
    </style>
</head>
<body>
    <div id="chatbox">
        <h2>FPL Chat Agent</h2>
        <div id="messages"></div>
        <form id="input-area">
            <input type="text" id="user-input" autocomplete="off" placeholder="Ask about FPL..." required />
            <button type="submit" id="send-btn">Send</button>
        </form>
    </div>
    <script>
        const messages = document.getElementById('messages');
        const inputForm = document.getElementById('input-area');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        function appendMessage(text, sender) {
            const div = document.createElement('div');
            div.className = 'msg ' + sender;
            div.textContent = (sender === 'user' ? 'You: ' : 'Agent: ') + text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        inputForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;
            appendMessage(text, 'user');
            userInput.value = '';
            sendBtn.disabled = true;

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                appendMessage(data.reply, 'bot');
            } catch (err) {
                appendMessage('Sorry, there was an error.', 'bot');
            }
            sendBtn.disabled = false;
        });
    </script>
</body>
</html>
